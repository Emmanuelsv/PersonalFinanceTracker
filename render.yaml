services:
  - type: web
    name: finanzas-bot
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase: 
          name: finanzas-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"

  - type: web
    name: finanzas-dashboard
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --all-extras --no-dev
    startCommand: ./scripts/start-dashboard.sh
    healthCheckPath: /_stcore/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: finanzas-db
    plan: free
    databaseName: finanzas
    user: finanzas
