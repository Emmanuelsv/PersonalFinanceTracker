services:
  - type: worker
    name: finanzas-bot
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase: PostgreSQL
          name: finanzas-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"

databases:
  - name: finanzas-db
    plan: free
    databaseName: finanzas
    user: finanzas
